<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Nouveau ticket - TechDesk</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="mb-4">Créer un nouveau ticket</h1>

      <form
        action="{{ url_for('main.nouveau_ticket') }}"
        method="POST"
        class="col-md-6"
      >
        <div class="mb-3">
          <label class="form-label">Titre</label>
          <input type="text" name="titre" class="form-control" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea
            name="description"
            class="form-control"
            rows="4"
            required
          ></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Catégorie</label>
          <select name="categorie" class="form-select">
            <option value="Materiel">Matériel</option>
            <option value="Logiciel">Logiciel</option>
            <option value="Acces">Accès / Permissions</option>
            <option value="Autre">Autre</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Priorité</label>
          <select name="priorite" class="form-select">
            <option value="basse">Basse</option>
            <option value="normale" selected>Normale</option>
            <option value="haute">Haute</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary">Créer le ticket</button>
        <a href="{{ url_for('main.home') }}" class="btn btn-secondary"
          >Annuler</a
        >
      </form>
    </div>
  </body>
</html>

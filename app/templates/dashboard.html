<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Dashboard - TechDesk</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container mt-5">

<a href="{{ url_for('main.home') }}">Retour a la liste</a>
<h1 class="mt-3 mb-4">Dashboard</h1>

<div class="row mb-4">
<div class="col-md-4">
<div class="card-custom text-center">
<h6 class="text-muted">Total tickets</h6>
<h2>{{ total_tickets }}</h2>
</div>
</div>
</div>

<div class="row">
<div class="col-md-6">
<div class="card-custom">
<h5>Tickets par statut</h5>
<canvas id="chartStatut"></canvas>
</div>
</div>

<div class="col-md-6">
<div class="card-custom">
<h5>Tickets par categorie</h5>
<canvas id="chartCategorie"></canvas>
</div>
</div>
</div>

</div>

<script>
const statutLabels = [{% for statut, count in stats_statut %}"{{ statut }}",{% endfor %}];
const statutData = [{% for statut, count in stats_statut %}{{ count }},{% endfor %}];

const categorieLabels = [{% for cat, count in stats_categorie %}"{{ cat }}",{% endfor %}];
const categorieData = [{% for cat, count in stats_categorie %}{{ count }},{% endfor %}];

new Chart(document.getElementById('chartStatut'), {
    type: 'doughnut',
    data: {
        labels: statutLabels,
        datasets: [{
            data: statutData,
            backgroundColor: ['#ef4444', '#f59e0b', '#10b981']
        }]
    }
});

new Chart(document.getElementById('chartCategorie'), {
    type: 'bar',
    data: {
        labels: categorieLabels,
        datasets: [{
            label: 'Nombre de tickets',
            data: categorieData,
            backgroundColor: '#4f46e5'
        }]
    },
    options: {
        scales: { y: { beginAtZero: true } }
    }
});
</script>

</body>
</html>
